name: Deploy Lending Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lending-service/**'
      - '.github/workflows/deploy-lending-service.yml'

permissions:
  id-token: write
  contents: read

env:
  RG: Core-Deploy
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Compute lending-service image
        id: image
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LOWER}/lending-service:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push lending-service image
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          docker build -t "$IMAGE" ./lending-service
          docker push "$IMAGE"

      - name: Authorize lending-service container app
        run: |
          az containerapp registry set \
            --name lending-service \
            --resource-group $RG \
            --server ghcr.io \
            --username ${{ secrets.GHCR_USERNAME }} \
            --password ${{ secrets.GHCR_PASSWORD }}

      - name: Deploy lending-service
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          az containerapp update \
            --name lending-service \
            --resource-group $RG \
            --image "$IMAGE"

      - name: Smoke test normalized lending routes
        run: |
          set -euo pipefail
          DUMMY_ADDRESS="0x1111111111111111111111111111111111111111"
          SMOKE_COMMAND="node -e \"(async()=>{const m=await fetch('http://localhost:3001/benqi/markets');console.log('MARKETS_STATUS='+m.status);if(m.status!==200)process.exit(1);const p=await fetch('http://localhost:3001/benqi/account/${DUMMY_ADDRESS}/positions');console.log('POSITIONS_STATUS='+p.status);if(p.status===404)process.exit(1);process.exit(0);})().catch((e)=>{console.error(e);process.exit(1);})\""

          for attempt in 1 2 3; do
            echo "Smoke attempt ${attempt}..."
            if az containerapp exec \
              --name lending-service \
              --resource-group "$RG" \
              --command "$SMOKE_COMMAND"; then
              echo "Lending smoke test passed."
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Lending smoke test failed after retries."
              exit 1
            fi
            sleep 15
          done
